<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de HTML Básico</title>
</head>
<body>
    <div> 
        <h1> TESTE DE PÁGINA 1 </h1>
        <h2> TESTE DE PÁGINA 1 </h2>
        <h3> TESTE DE PÁGINA 1 </h3>
        <p> Teste de elementos <strong> e tags </strong> </p>
    </div>

    <div> 
        <ol>
            <li> Item númerado 1</li>
            <li> Item númerado 2</li>
            <li> Item númerado 3</li>
        </ol>
    </div>
    
    <div>
        <ul>
            <li> <a href="http://www.google.com">Visite o Site da Google</a></li>
            <li> <a href="http://www.Microsoft.com">Visite o Site da Microsoft</a></li>
            <li> <a href="http://www.Microsoft.com" target="_blank">Visite o Site da Microsoft</a></li>
        </ul>
    </div>

    <img src="https://www.freebsd.org/gifs/daemon_hammer.jpg" alt="Diabinho FreeBSD" width="250" height="250" />
    
    <!-- Trabalhando com Layout da Página-->
    <!-- <div> </div> - crio conteiners para divisao de blocos  -->
    <div>
        <p> Testando conteiner </p>
    </div>

    <!-- <span> </span> - aplico estilos a partes especificas do texto  -->
     <h3> Testando estilização com <span style="color: blue;">SPAM</span></h3>

    <!-- TAGS SEMÂNTICAS  -->
     <!-- <header> <nav> <main> <article> <section> <footer>  -->
</body>
</html>
